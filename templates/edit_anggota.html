{% extends 'base.html' %}
{% set title = 'Edit Data Anggota' %}

{% block content %}
<div class="page-header" style="margin-bottom: 2rem;">
    <div class="page-title">
        <h1>Edit Informasi Anggota</h1>
        <p>Perbarui profil anggota perpustakaan.</p>
    </div>
    <div class="page-actions">
        <a href="{{ url_for('anggota') }}" class="btn btn-outline">
            ← Kembali
        </a>
    </div>
</div>

<div class="section-card">
    <form class="form-grid" method="post">
        <div class="form-group">
            <label>Nama Lengkap</label>
            <input type="text" name="name" class="form-input" value="{{ member.name }}" required>
        </div>
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" class="form-input" value="{{ member.username }}" required>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" class="form-input" value="{{ member.email }}">
        </div>
        <div class="form-group">
            <label>No. Telepon</label>
            <input type="text" name="phone" class="form-input" value="{{ member.phone }}">
        </div>
        <div class="form-group span-2">
            <label>Alamat</label>
            <textarea name="address" rows="3" class="form-input">{{ member.address }}</textarea>
        </div>
        <div class="span-2" style="text-align: right; padding-top: 1.5rem; border-top: 1px solid var(--border-light);">
            <button class="btn btn-primary" type="submit">Simpan Perubahan</button>
        </div>
    </form>
</div>
{% endblock %}
