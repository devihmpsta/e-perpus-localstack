{% extends 'base.html' %}
{% set title = 'Edit Profil' %}

{% block content %}
<div class="page-header" style="margin-bottom: 2rem;">
    <div class="page-title">
        <h1>Ubah Informasi Profil</h1>
        <p>Perbarui nama tampilan dan informasi akun Anda.</p>
    </div>
    <div class="page-actions">
        <a href="{{ url_for('profil') }}" class="btn btn-outline">
            ← Kembali
        </a>
    </div>
</div>

<div class="section-card" style="max-width: 600px; margin: 0 auto;">
    <form class="form-grid one" method="post">
        <div class="form-group">
            <label>Nama Lengkap</label>
            <input type="text" name="name" class="form-input" value="{{ user.name if user else current_user }}" required>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" class="form-input" value="{{ user.email if user else '' }}" placeholder="Email aktif Anda">
        </div>
        <div class="form-group">
            <label>Telepon</label>
            <input type="text" name="phone" class="form-input" value="{{ user.phone if user else '' }}" placeholder="Nomor telepon/WA">
        </div>
        <div class="form-group">
            <label>Alamat</label>
            <textarea name="address" class="form-input" rows="3" placeholder="Alamat lengkap">{{ user.address if user else '' }}</textarea>
        </div>
        <div class="form-group">
            <label>Username (Tidak dapat diubah)</label>
            <input type="text" class="form-input" value="{{ session.get('username') }}" disabled>
        </div>
        <div class="form-group">
            <label>Level Akses</label>
            <input type="text" class="form-input" value="{{ current_role }}" disabled>
        </div>
        
        <div style="margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border-light); text-align: right;">
            <button class="btn btn-primary" type="submit">Simpan Perubahan</button>
        </div>
    </form>
</div>
{% endblock %}
