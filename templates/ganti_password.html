{% extends 'base.html' %}
{% set title = 'Ganti Kata Sandi' %}

{% block content %}
<div class="page-header" style="margin-bottom: 2rem;">
    <div class="page-title">
        <h1>Keamanan Akun</h1>
        <p>Perbarui kata sandi Anda secara berkala untuk menjaga keamanan akun.</p>
    </div>
    <div class="page-actions">
        <a href="{{ url_for('profil') }}" class="btn btn-outline">
            ← Kembali
        </a>
    </div>
</div>

<div class="section-card" style="max-width: 600px; margin: 0 auto;">
    <form class="form-grid one" method="post">
        <div class="form-group">
            <label>Kata Sandi Lama</label>
            <input type="password" name="old_password" class="form-input" placeholder="Masukkan kata sandi saat ini" required>
        </div>
        <div class="form-group">
            <label>Kata Sandi Baru</label>
            <input type="password" name="new_password" class="form-input" placeholder="Minimal 8 karakter" required>
        </div>
        <div class="form-group">
            <label>Konfirmasi Kata Sandi Baru</label>
            <input type="password" name="confirm_password" class="form-input" placeholder="Ulangi kata sandi baru" required>
        </div>
        
        <div style="margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border-light); text-align: right;">
            <button class="btn btn-primary" type="submit">Ubah Kata Sandi</button>
        </div>
    </form>
</div>
{% endblock %}
